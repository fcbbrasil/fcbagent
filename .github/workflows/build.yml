name: Build FCBAgent (Multi-Windows)

on:
  push:
    branches: [main]

jobs:

  build-win7-8:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.8 (32-bit)
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: x86

      - name: Install dependencies
        run: pip install pyinstaller requests websocket-client pillow pystray pyserial

      - name: Build EXE Win7-8
        run: pyinstaller FCBAgent-win7.spec

      - name: Upload artifact Win7-8
        uses: actions/upload-artifact@v4
        with:
          name: FCBAgent-Win7-8
          path: dist/FCBAgent-Win7-8.exe

  build-win10-11:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11 (64-bit)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: x64

      - name: Install dependencies
        run: pip install pyinstaller requests websocket-client pillow pystray pyserial

      - name: Build EXE Win10-11
        run: pyinstaller FCBAgent-win10.spec

      - name: Upload artifact Win10-11
        uses: actions/upload-artifact@v4
        with:
          name: FCBAgent-Win10-11
          path: dist/FCBAgent-Win10-11.exe

  deploy:
    runs-on: ubuntu-latest
    needs: [build-win7-8, build-win10-11]
    steps:
      - name: Download Win7-8
        uses: actions/download-artifact@v4
        with:
          name: FCBAgent-Win7-8
          path: dist/

      - name: Download Win10-11
        uses: actions/download-artifact@v4
        with:
          name: FCBAgent-Win10-11
          path: dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 187.77.231.176 >> ~/.ssh/known_hosts

      - name: Deploy para VPS
        run: |
          scp -i ~/.ssh/id_ed25519 dist/FCBAgent-Win7-8.exe root@187.77.231.176:/var/www/fcb/downloads/
          scp -i ~/.ssh/id_ed25519 dist/FCBAgent-Win10-11.exe root@187.77.231.176:/var/www/fcb/downloads/
          echo "✅ Deploy concluído"
