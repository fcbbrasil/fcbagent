name: Build FCBAgent.exe

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller requests websocket-client pillow pystray pyserial

      - name: Build EXE
        run: pyinstaller FCBAgent.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FCBAgent
          path: dist/FCBAgent.exe
